spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}
jwt.refresh-token.expiration-ms=${JWT_REFRESH_EXPIRATION_MS}
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.frontend.login-url=${APP_FRONTEND_LOGIN_URL}
app.figure.image-dir=${APP_FIGURE_IMAGE_DIR}
app.data-initializer.create-admin-user=${APP_DATA_INITIALIZER_CREATE_ADMIN_USER:false}
app.data-initializer.admin-fullname=${APP_DATA_INITIALIZER_ADMIN_FULLNAME:Default Admin}
app.data-initializer.admin-email=${APP_DATA_INITIALIZER_ADMIN_EMAIL:admin@anakronik.com}
app.data-initializer.admin-password=${APP_DATA_INITIALIZER_ADMIN_PASSWORD}